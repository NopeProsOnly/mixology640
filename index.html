<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixology640 | The Art of the Pour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --gold: #D4AF37;
            --dark: #050505;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Navbar backdrop */
        .glass-nav {
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        /* Mobile Menu - Full Screen Overlay */
        #mobile-menu {
            position: fixed;
            inset: 0;
            background: rgba(5, 5, 5, 0.98);
            z-index: 105;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #mobile-menu.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* Menu Button - Ensure it stays on top of everything */
        #menu-toggle {
            z-index: 110;
        }

        .btn-gold {
            background: var(--gold);
            color: black;
            transition: all 0.3s ease;
        }

        .recipe-card {
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="glass-nav fixed w-full px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="text-2xl font-bold tracking-tighter uppercase">
                Mixology<span class="text-[var(--gold)]">640</span>
            </a>
            
            <!-- Desktop Links -->
            <div class="hidden md:flex space-x-8 text-xs tracking-[0.3em] uppercase font-semibold">
                <a href="#recipes" class="hover:text-[var(--gold)] transition">Recipes</a>
                <a href="#tutorials" class="hover:text-[var(--gold)] transition">Tutorials</a>
                <a href="#tools" class="hover:text-[var(--gold)] transition">Shop</a>
                <a href="#booking" class="hover:text-[var(--gold)] transition">Booking</a>
            </div>

            <!-- Hamburger / Close Button -->
            <button id="menu-toggle" class="md:hidden text-white p-2 flex items-center justify-center focus:outline-none">
                <i data-lucide="menu" id="menu-burger" class="w-8 h-8"></i>
                <i data-lucide="x" id="menu-close" class="w-8 h-8 hidden text-[var(--gold)]"></i>
            </button>
        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu">
        <div class="flex flex-col space-y-8 text-center">
            <a href="#recipes" class="mobile-link text-4xl font-serif italic hover:text-[var(--gold)] transition">Recipes</a>
            <a href="#tutorials" class="mobile-link text-4xl font-serif italic hover:text-[var(--gold)] transition">Tutorials</a>
            <a href="#tools" class="mobile-link text-4xl font-serif italic hover:text-[var(--gold)] transition">Shop</a>
            <a href="#booking" class="mobile-link text-4xl font-serif italic hover:text-[var(--gold)] transition">Booking</a>
        </div>
        
        <!-- Socials in Menu -->
        <div class="flex space-x-8 mt-16 text-[var(--gold)]">
            <i data-lucide="instagram" class="w-6 h-6"></i>
            <i data-lucide="youtube" class="w-6 h-6"></i>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="h-screen flex items-center justify-center text-center px-4">
        <div class="relative z-10">
            <span class="text-[var(--gold)] tracking-[0.5em] uppercase text-xs mb-4 block">Home Bar Mastery</span>
            <h1 class="text-6xl md:text-9xl font-bold mb-8 italic">The Art of the Pour</h1>
            <p class="max-w-xl mx-auto text-gray-400 text-lg mb-10 font-light leading-relaxed">
                Elevating spirits through craft, chemistry, and culture.
            </p>
            <a href="#recipes" class="btn-gold inline-block px-10 py-4 uppercase tracking-widest font-bold text-sm">
                Watch Recipes
            </a>
        </div>
    </section>

    <!-- Simple placeholder for page length so you can test scroll/nav -->
    <section id="recipes" class="py-24 px-6 max-w-7xl mx-auto min-h-screen">
        <h2 class="text-5xl italic mb-12 border-b border-white/10 pb-4">Latest Recipes</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="h-64 bg-white/5 border border-white/10 flex items-center justify-center">
                <p class="text-[var(--gold)] tracking-widest uppercase">Spirit One</p>
            </div>
            <div class="h-64 bg-white/5 border border-white/10 flex items-center justify-center">
                <p class="text-[var(--gold)] tracking-widest uppercase">Spirit Two</p>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-gray-600 text-[10px] tracking-widest">
        &copy; 2024 MIXOLOGY640
    </footer>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const menuToggle = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const burgerIcon = document.getElementById('menu-burger');
        const closeIcon = document.getElementById('menu-close');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        // Function to Open/Close
        function toggleMenu() {
            const isOpen = mobileMenu.classList.contains('active');
            
            if (!isOpen) {
                // OPENING
                mobileMenu.classList.add('active');
                burgerIcon.classList.add('hidden');
                closeIcon.classList.remove('hidden');
                document.body.style.overflow = 'hidden'; // Stop background scroll
            } else {
                // CLOSING
                mobileMenu.classList.remove('active');
                burgerIcon.classList.remove('hidden');
                closeIcon.classList.add('hidden');
                document.body.style.overflow = 'auto'; // Re-enable scroll
            }
        }

        // Click on Hamburger/X
        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
        });

        // Click on any link - closes menu
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                if (mobileMenu.classList.contains('active')) {
                    toggleMenu();
                }
            });
        });

        // Click on the dark overlay itself to go back
        mobileMenu.addEventListener('click', (e) => {
            if (e.target === mobileMenu) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
