<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixology640 | The Art of the Pour</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Liquid Background Elements -->
    <div class="liquid-bg">
        <div class="blob" style="top: -10%; left: -10%;"></div>
        <div class="blob" style="bottom: -10%; right: -10%; animation-delay: -5s;"></div>
    </div>

    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-[100] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="#" class="text-2xl font-bold tracking-tighter uppercase">
                Mixology<span class="text-[var(--gold)]">640</span>
            </a>

            <!-- Desktop Links -->
            <div class="hidden md:flex space-x-8 text-xs tracking-[0.3em] uppercase font-semibold">
                <a href="#recipes" class="hover:text-[var(--gold)] transition">Recipes</a>
                <a href="#tutorials" class="hover:text-[var(--gold)] transition">Tutorials</a>
                <a href="#booking" class="hover:text-[var(--gold)] transition">Booking</a>
            </div>

            <!-- Hamburger Button -->
            <button id="menu-toggle"
                class="md:hidden text-white p-2 relative z-[110] w-10 h-10 flex items-center justify-center group focus:outline-none">
                <div class="relative w-6 h-6 transform transition-all duration-300 origin-center" id="icon-container">
                    <i data-lucide="menu" id="menu-icon"
                        class="absolute inset-0 transition-all duration-300 opacity-100 rotate-0 scale-100"></i>
                    <i data-lucide="x" id="close-icon"
                        class="absolute inset-0 transition-all duration-300 opacity-0 -rotate-90 scale-50"></i>
                </div>
            </button>
        </div>

        <!-- Mobile Menu Overlay -->
        <div id="mobile-menu"
            class="fixed top-0 left-0 w-full h-screen bg-[#050505] z-[105] flex flex-col items-center justify-center space-y-10 text-center md:hidden">
            <a href="#recipes" class="mobile-link text-3xl font-serif italic hover:text-[var(--gold)]">Recipes</a>
            <a href="#tutorials" class="mobile-link text-3xl font-serif italic hover:text-[var(--gold)]">Tutorials</a>
            <a href="#booking" class="mobile-link text-3xl font-serif italic hover:text-[var(--gold)]">Booking</a>

            <!-- Removed Social Links -->
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="h-screen flex items-center justify-center text-center px-4 relative">
        <div class="relative z-10">
            <span class="text-[var(--gold)] tracking-[0.5em] uppercase text-xs mb-4 block">Elevated Spirits</span>
            <h1 class="text-6xl md:text-9xl font-bold mb-8 italic">The Art of the Pour</h1>
            <p class="max-w-xl mx-auto text-gray-400 text-lg mb-10 font-light leading-relaxed">
                Master the craft of high-end mixology. Professional techniques and the science of flavor.
            </p>
            <div class="flex flex-col md:flex-row items-center justify-center gap-4">
                <a href="#recipes"
                    class="btn-gold px-10 py-4 uppercase tracking-widest font-bold text-sm w-64 md:w-auto text-center">
                    Latest Recipes
                </a>
                <a href="#booking"
                    class="border border-white/20 hover:border-[var(--gold)] px-10 py-4 uppercase tracking-widest font-bold text-sm transition w-64 md:w-auto backdrop-blur-sm text-center">
                    Book Event
                </a>
            </div>
        </div>
    </section>

    <!-- Recipe Gallery Section -->
    <section id="recipes" class="py-24 px-6 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8 text-center md:text-left">
            <div class="w-full md:w-auto">
                <h2 class="text-5xl mb-4 italic">The Collection</h2>
                <div class="h-1 w-20 bg-[var(--gold)] mx-auto md:mx-0"></div>
            </div>

            <div class="relative w-full md:w-auto flex justify-center md:justify-end mt-4 md:mt-0">
                <div
                    class="relative grid items-center text-xs tracking-[0.2em] uppercase font-bold text-[var(--gold)] border-b border-[var(--gold)] pb-2">
                    <select id="recipe-filter"
                        class="col-start-1 row-start-1 w-full h-full bg-transparent outline-none appearance-none cursor-pointer z-10 pr-6">
                        <option value="all" class="bg-[var(--dark)] text-white">ALL</option>
                    </select>
                    <span id="recipe-filter-sizer"
                        class="col-start-1 row-start-1 opacity-0 pointer-events-none pr-6 whitespace-nowrap"
                        aria-hidden="true">ALL</span>
                    <i data-lucide="chevron-down"
                        class="col-start-1 row-start-1 justify-self-end w-4 h-4 pointer-events-none z-0"></i>
                </div>
            </div>
        </div>

        <div id="recipe-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Dynamic content loaded via JSON -->
        </div>
    </section>

    <!-- Booking / Contact -->
    <section id="booking" class="py-24 px-6">
        <div class="max-w-3xl mx-auto border border-white/10 p-8 md:p-12 bg-white/5">
            <h2 class="text-4xl italic mb-8 text-center">Event Inquiry</h2>

            <script type="text/javascript">var submitted = false;</script>
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"
                onload="if(submitted) { alert('Inquiry Sent! We will contact you soon.'); }"></iframe>

            <form
                action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSc_QFSrhQtHZQMMRxK3ZWbhIiNiaYw82HOLCUDg7bkadqeqoA/formResponse"
                method="POST" target="hidden_iframe" onsubmit="submitted=true;"
                class="grid grid-cols-1 md:grid-cols-2 gap-8 text-sm tracking-widest uppercase">
                <div class="flex flex-col gap-2">
                    <label for="name" class="text-gray-400 text-xs">Full Name</label>
                    <input type="text" id="name" name="entry.2092238618" required
                        class="bg-transparent border-b border-white/20 py-3 outline-none focus:border-[var(--gold)] transition">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="email" class="text-gray-400 text-xs">Email Address</label>
                    <input type="email" id="email" name="entry.1556369182" required
                        class="bg-transparent border-b border-white/20 py-3 outline-none focus:border-[var(--gold)] transition">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="date" class="text-gray-400 text-xs">Event Date</label>
                    <input type="date" id="date" name="entry.1753222212" required
                        class="bg-transparent border-b border-white/20 py-3 outline-none focus:border-[var(--gold)] transition cursor-pointer [color-scheme:dark]">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="attendees" class="text-gray-400 text-xs">Number of Attendees</label>
                    <div class="relative w-full">
                        <select id="attendees" name="entry.1896190210" required
                            class="w-full bg-transparent border-b border-white/20 py-3 pr-8 outline-none focus:border-[var(--gold)] transition appearance-none cursor-pointer">
                            <option value="" class="bg-[var(--dark)] text-white" disabled selected hidden></option>
                            <option value="Under 25" class="bg-[var(--dark)] text-white">Under 25</option>
                            <option value="25 - 50" class="bg-[var(--dark)] text-white">25 - 50</option>
                            <option value="51 - 100" class="bg-[var(--dark)] text-white">51 - 100</option>
                            <option value="101 - 200" class="bg-[var(--dark)] text-white">101 - 200</option>
                            <option value="More than 200" class="bg-[var(--dark)] text-white">More than 200</option>
                        </select>
                        <i data-lucide="chevron-down"
                            class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 md:col-span-2">
                    <div class="flex flex-col gap-2">
                        <label for="start-time" class="text-gray-400 text-xs">Start Time</label>
                        <input type="time" id="start-time" name="entry.588393791" required
                            class="bg-transparent border-b border-white/20 py-3 outline-none focus:border-[var(--gold)] transition cursor-pointer [color-scheme:dark]">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label for="end-time" class="text-gray-400 text-xs">End Time</label>
                        <input type="time" id="duration" name="entry.1437648811" required
                            class="bg-transparent border-b border-white/20 py-3 outline-none focus:border-[var(--gold)] transition cursor-pointer [color-scheme:dark]">
                    </div>
                </div>

                <div class="flex flex-col gap-2 md:col-span-2">
                    <label for="details" class="text-gray-400 text-xs">Event Details</label>
                    <textarea id="details" name="entry.479301265" rows="4" required
                        class="bg-transparent border-b border-white/20 py-3 outline-none focus:border-[var(--gold)] h-32 transition resize-none"></textarea>
                </div>

                <button type="submit"
                    class="md:col-span-2 btn-gold py-4 mt-4 font-bold uppercase tracking-widest text-sm w-full">
                    Send Inquiry
                </button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 text-center border-t border-white/5 flex flex-col items-center gap-6">
        <a href="https://www.instagram.com/mixology640/" aria-label="Instagram"
            class="text-gray-500 hover:text-[var(--gold)] transition">
            <i data-lucide="instagram" class="w-5 h-5"></i>
        </a>
        <p class="text-[10px] text-gray-600 uppercase tracking-[0.4em]">&copy; 2024 Mixology640. Drink Responsibly.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
